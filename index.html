<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USMLE Medico - Production</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<style>
body {
margin: 0;
font-family: Arial;
background: #f4f8fb;
}

/* NAVBAR */
.navbar {
background: #0d6efd;
color: white;
padding: 15px;
display: flex;
justify-content: space-between;
align-items: center;
}

/* CONTAINER */
.container {
max-width: 900px;
margin: auto;
padding: 20px;
}

/* INPUTS */
input {
padding: 10px;
margin: 5px;
width: 220px;
border: 1px solid #ccc;
border-radius: 5px;
}

/* BUTTON */
button {
padding: 10px 15px;
background: #0d6efd;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}

/* CARD */
.card {
background: white;
padding: 15px;
margin: 10px 0;
border-radius: 10px;
box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

/* SEARCH */
.search {
text-align: center;
margin: 15px;
}

/* ADMIN */
.admin {
background: white;
padding: 15px;
border-radius: 10px;
margin-top: 20px;
}

/* FILE UPLOAD */
.upload {
margin-top: 15px;
}

@media(max-width:600px){
input{width:90%;}
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<h2>USMLE Medico Pro</h2>
</div>

<div class="container">

<!-- AUTH -->
<h2>Authentication</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<hr>

<!-- SEARCH -->
<div class="search">
<input id="searchBox" placeholder="Search notes..." onkeyup="filterNotes()">
</div>

<!-- ADMIN PANEL -->
<div class="admin">
<h3>Admin Panel</h3>

<input id="noteInput" placeholder="Add Note">
<button onclick="addNote()">Add Note</button>

<div class="upload">
<h4>Upload PDF (Storage)</h4>
<input type="file" id="file">
<button onclick="uploadPDF()">Upload</button>
</div>

</div>

<!-- NOTES -->
<h3>Notes</h3>
<div id="notes"></div>

</div>

<script>

/* FIREBASE CONFIG (REPLACE THIS) */
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "YOUR_AUTH_DOMAIN",
projectId: "YOUR_PROJECT_ID",
storageBucket: "YOUR_STORAGE_BUCKET"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* AUTH */
function signup(){
auth.createUserWithEmailAndPassword(email.value, password.value)
.then(()=>alert("User created"));
}

function login(){
auth.signInWithEmailAndPassword(email.value, password.value)
.then(()=>alert("Logged in"));
}

function logout(){
auth.signOut();
}

/* ADD NOTE */
function addNote(){
db.collection("notes").add({
text: noteInput.value,
time: Date.now()
});
noteInput.value = "";
loadNotes();
}

/* LOAD NOTES */
function loadNotes(){
db.collection("notes").orderBy("time").get()
.then(snapshot=>{
notes.innerHTML = "";
snapshot.forEach(doc=>{
notes.innerHTML += `<div class="card">${doc.data().text}</div>`;
});
});
}

/* SEARCH */
function filterNotes(){
let val = searchBox.value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display = c.innerText.toLowerCase().includes(val) ? "block":"none";
});
}

/* PDF UPLOAD */
function uploadPDF(){
let file = document.getElementById("file").files[0];

if(!file){
alert("Select file first");
return;
}

let ref = storage.ref("pdfs/" + file.name);

ref.put(file).then(()=>{
alert("Uploaded successfully");
});
}

loadNotes();

</script>

</body>
</html>
